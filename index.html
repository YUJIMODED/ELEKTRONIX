<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELEKTRONIX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at top, #0a0a12, #000);
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* FONDO */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle, rgba(0,255,255,0.08), transparent 40%),
        radial-gradient(circle, rgba(255,0,255,0.08), transparent 40%);
    animation:bgMove 10s linear infinite;
}

@keyframes bgMove{
    0%{transform:translate(0,0);}
    50%{transform:translate(-8%,-6%);}
    100%{transform:translate(0,0);}
}

/* HEADER */
.header{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
}

.title{
    font-size:22px;
    font-weight:700;
    letter-spacing:3px;
    color:#00ffaa;
}

.subtitle{
    font-size:12px;
    color:#888;
    margin-top:4px;
    letter-spacing:2px;
}

/* CARD */
.card{
    position:relative;
    width:320px;
    border-radius:26px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(30px);
    box-shadow:
        0 0 80px rgba(0,0,0,0.9),
        inset 0 0 30px rgba(255,255,255,0.03);
    overflow:hidden;
    text-align:center;
    padding:20px;
    z-index:2;
    animation:fadeUp 1s ease;
}

/* IMG */
.img-box{ padding:15px; }
.img-box img{
    width:100%;
    height:200px;
    object-fit:contain;
    filter:drop-shadow(0 0 15px rgba(0,255,255,0.3));
}

/* TEXT */
.name{ font-size:18px; font-weight:700; margin-top:10px; }
.desc{ font-size:13px; color:#aaa; margin:10px 0; }
.price{
    font-size:22px;
    font-weight:700;
    color:#00ffaa;
    margin-bottom:20px;
}

/* BOTÓN */
.buy{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#00f0ff,#00ffaa);
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
.buy:hover{ transform:scale(1.05); }

/* TIKTOK */
.tiktok{
    position:absolute;
    bottom:40px;
    right:15px;
    background:#111;
    padding:8px 12px;
    border-radius:10px;
    font-size:12px;
    cursor:pointer;
    transition:.3s;
}
.tiktok:hover{
    background:#00ffaa;
    color:black;
}

/* FOOTER */
.footer{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#777;
}

/* ANIMACIÓN */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
    <div class="title">ELEKTRONIX</div>
    <div class="subtitle">Página de RAY</div>
</div>

<div class="card">

    <div class="img-box">
        <img src="audifon.png">
    </div>

    <div class="name">nice to hear comfort (tws)</div>

    <div class="desc">
        audífonos cómodos, no lastiman y se ajustan perfectamente a la oreja
    </div>

    <div class="price">$650 DOP</div>

    <button class="buy" onclick="comprar()">Comprar ahora</button>

</div>

<div class="tiktok" onclick="abrirTikTok()">TikTok</div>

<div class="footer">© 2026 Manuel mods</div>

<script>
function comprar(){
    let mensaje = "me interesa el producto nice to hear comfort (tws) quisiera saber el precio y si tienes envíos a domicilio";
    window.open("https://wa.me/18492505897?text=" + encodeURIComponent(mensaje));
}

function abrirTikTok(){
    window.open("https://tiktok.com/@manuel_mods_games");
}
</script>

</body>
</html>
